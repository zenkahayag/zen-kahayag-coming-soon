<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen Kahayag — Coming Soon</title>
<meta name="description" content="Zen Kahayag - giya para sa ugma. Coming soon.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  :root {
    /* ロゴ画像の四隅の実測値に、ページ背景をピッタリ合わせる */
    --bg-base: #11162d;
    --bg-deep: #0a0e1f;
    --gold: #ffeeaa;
    --gold-soft: #fff6d5;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    /* ロゴ画像の背景色を中心色として使い、外側だけ少し暗くする */
    background: radial-gradient(circle at 50% 38%, var(--bg-base) 0%, var(--bg-deep) 75%);
    color: var(--gold-soft);
    font-family: 'Josefin Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    overflow-x: hidden;
  }

  .container {
    text-align: center;
    max-width: 600px;
    width: 100%;
  }

  .logo-wrap {
    position: relative;
    width: 100%;
    max-width: 480px;
    margin: 0 auto 32px;
    opacity: 0;
    animation: fadeIn 1.4s ease-out forwards;
  }

  .logo {
    width: 100%;
    height: auto;
    display: block;
    /* 画像の四角い輪郭を、中心から外側に向けて透明にフェードさせる。
       これで背景との境界線（四角い枠）が視覚的に消える */
    -webkit-mask-image: radial-gradient(ellipse 62% 78% at 50% 44%, black 55%, transparent 88%);
    mask-image: radial-gradient(ellipse 62% 78% at 50% 44%, black 55%, transparent 88%);
  }

  .coming-soon {
    font-family: 'Cinzel', serif;
    font-size: clamp(1rem, 4vw, 1.4rem);
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeIn 1.2s ease-out 0.5s forwards;
  }

  .message {
    font-size: clamp(0.9rem, 3vw, 1.1rem);
    color: var(--gold-soft);
    opacity: 0;
    animation: fadeIn 1.2s ease-out 0.8s forwards;
    line-height: 1.6;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  footer {
    margin-top: 48px;
    font-size: 0.75rem;
    color: rgba(255, 246, 213, 0.4);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo-wrap">
    <img src="zen-kahayag-logo.webp" alt="Zen Kahayag - giya para sa ugma" class="logo" width="1200" height="864">
  </div>
  <p class="coming-soon">Coming Soon</p>
  <p class="message">Something meaningful is on its way.</p>
  <footer>&copy; 2026 Zen Kahayag</footer>
</div>

</body>
</html>
